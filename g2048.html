<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Rajdhani',sans-serif;background:linear-gradient(135deg,#0d0d1a,#12122a,#1a1a3e);min-height:100vh;color:#fff;display:flex;flex-direction:column;align-items:center;}
    .navbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:rgba(13,13,26,0.9);border-bottom:1px solid rgba(255,255,255,0.08);}
    .logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#9c27b0;}
    .back-btn{padding:7px 16px;background:transparent;border:1px solid #9c27b0;color:#9c27b0;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;transition:all 0.3s;}
    .back-btn:hover{background:#9c27b0;color:#fff;}
    .game-wrap{width:100%;max-width:440px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;}
    .score-bar{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
    .score-item{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 20px;text-align:center;}
    .score-item .val{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#9c27b0;}
    .score-item .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;background:rgba(156,39,176,0.1);border:2px solid rgba(156,39,176,0.3);border-radius:12px;padding:10px;width:100%;max-width:380px;margin-bottom:16px;}
    .cell{aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:700;font-size:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);transition:all 0.1s;}
    .start-btn{padding:12px 32px;background:#9c27b0;color:#fff;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-bottom:10px;}
    .hint{font-size:13px;color:#666;text-align:center;}
    .ctrl-btns{display:none;flex-direction:column;align-items:center;gap:6px;margin-bottom:12px;}
    .ctrl-row{display:flex;gap:6px;}
    .ctrl-btn{width:50px;height:50px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;border-radius:8px;cursor:pointer;transition:background 0.2s;}
    .ctrl-btn:hover{background:#9c27b0;}
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:999;}
    .overlay.show{display:flex;}
    .overlay-box{background:#12122a;border:2px solid #9c27b0;border-radius:20px;padding:40px;text-align:center;min-width:280px;}
    .overlay-box h2{font-family:'Orbitron',monospace;font-size:22px;margin-bottom:10px;color:#9c27b0;}
    .overlay-box .big{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:#9c27b0;margin:12px 0;}
    .overlay-box p{color:#888;margin-bottom:20px;}
    .btn-row{display:flex;gap:12px;justify-content:center;}
    .btn-o{padding:12px 28px;background:#9c27b0;color:#fff;border:none;border-radius:8px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-s{padding:12px 20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:8px;cursor:pointer;}
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">🔢 2048</div>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">⬅ Dashboard</button>
  </div>
  <div class="game-wrap">
    <div class="score-bar">
      <div class="score-item"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
      <div class="score-item"><div class="val" id="bestVal">0</div><div class="lbl">Best</div></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="ctrl-btns" id="ctrlBtns">
      <div class="ctrl-row"><button class="ctrl-btn" onclick="move('up')">⬆</button></div>
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="move('left')">⬅</button>
        <button class="ctrl-btn" onclick="move('down')">⬇</button>
        <button class="ctrl-btn" onclick="move('right')">➡</button>
      </div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startGame()">▶ START 2048</button>
    <div class="hint">Arrow keys ya buttons use karo</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <h2 id="overlayTitle">GAME OVER!</h2>
      <div class="big" id="finalScore">0</div>
      <p id="finalMsg">-</p>
      <div class="btn-row">
        <button class="btn-o" onclick="startGame();document.getElementById('overlay').classList.remove('show');">🔄 Again</button>
        <button class="btn-s" onclick="window.location.href='dashboard.html'">🏠 Dashboard</button>
      </div>
    </div>
  </div>

  <script>
    if(localStorage.getItem('isLoggedIn')!=='true') window.location.href='index.html';
    var best=parseInt(localStorage.getItem('g2048Best'))||0;
    document.getElementById('bestVal').innerText=best;
    var board,score,running=false;
    var colors={2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'};
    var textColors={2:'#776e65',4:'#776e65',8:'#f9f6f2',16:'#f9f6f2',32:'#f9f6f2',64:'#f9f6f2',128:'#f9f6f2',256:'#f9f6f2',512:'#f9f6f2',1024:'#f9f6f2',2048:'#f9f6f2'};

    function startGame(){
      document.getElementById('startBtn').style.display='none';
      document.getElementById('ctrlBtns').style.display='flex';
      board=Array(4).fill(null).map(()=>Array(4).fill(0));
      score=0; running=true;
      addTile(); addTile();
      render();
    }

    function addTile(){
      var empty=[];
      for(var r=0;r<4;r++) for(var c=0;c<4;c++) if(board[r][c]===0) empty.push({r,c});
      if(empty.length===0) return;
      var pos=empty[Math.floor(Math.random()*empty.length)];
      board[pos.r][pos.c]=Math.random()<0.9?2:4;
    }

    function render(){
      var grid=document.getElementById('grid');
      grid.innerHTML='';
      for(var r=0;r<4;r++) for(var c=0;c<4;c++){
        var val=board[r][c];
        var cell=document.createElement('div');
        cell.className='cell';
        if(val>0){
          cell.innerText=val;
          cell.style.background=colors[val]||'#3c3a32';
          cell.style.color=textColors[val]||'#f9f6f2';
          cell.style.fontSize=val>=1000?'13px':val>=100?'16px':'18px';
        }
        grid.appendChild(cell);
      }
      document.getElementById('scoreVal').innerText=score;
    }

    function move(dir){
      if(!running) return;
      var moved=false;
      if(dir==='left'||dir==='right'){
        for(var r=0;r<4;r++){
          var row=board[r].filter(x=>x!==0);
          if(dir==='right') row.reverse();
          for(var i=0;i<row.length-1;i++){
            if(row[i]===row[i+1]){ row[i]*=2; score+=row[i]; row.splice(i+1,1); }
          }
          while(row.length<4) row.push(0);
          if(dir==='right') row.reverse();
          if(row.join()!==board[r].join()) moved=true;
          board[r]=row;
        }
      } else {
        for(var c=0;c<4;c++){
          var col=board.map(r=>r[c]).filter(x=>x!==0);
          if(dir==='down') col.reverse();
          for(var i=0;i<col.length-1;i++){
            if(col[i]===col[i+1]){ col[i]*=2; score+=col[i]; col.splice(i+1,1); }
          }
          while(col.length<4) col.push(0);
          if(dir==='down') col.reverse();
          for(var r=0;r<4;r++){ if(board[r][c]!==col[r]) moved=true; board[r][c]=col[r]; }
        }
      }
      if(moved){ addTile(); render(); checkEnd(); }
      if(score>best){ best=score; localStorage.setItem('g2048Best',best); document.getElementById('bestVal').innerText=best; }
    }

    function checkEnd(){
      for(var r=0;r<4;r++) for(var c=0;c<4;c++){
        if(board[r][c]===2048){ win(); return; }
        if(board[r][c]===0) return;
        if(r<3&&board[r][c]===board[r+1][c]) return;
        if(c<3&&board[r][c]===board[r][c+1]) return;
      }
      gameOver();
    }

    function win(){
      running=false;
      var played=parseInt(localStorage.getItem('gamesPlayed'))||0;
      localStorage.setItem('gamesPlayed',played+1);
      document.getElementById('overlayTitle').innerText='🏆 2048 REACHED!';
      document.getElementById('finalScore').innerText=score;
      document.getElementById('finalMsg').innerText='Zabardast! Tum jeet gaye!';
      document.getElementById('overlay').classList.add('show');
    }

    function gameOver(){
      running=false;
      var played=parseInt(localStorage.getItem('gamesPlayed'))||0;
      localStorage.setItem('gamesPlayed',played+1);
      document.getElementById('overlayTitle').innerText='GAME OVER!';
      document.getElementById('finalScore').innerText=score;
      document.getElementById('finalMsg').innerText='Koi move nahi bacha!';
      document.getElementById('overlay').classList.add('show');
    }

    document.addEventListener('keydown',function(e){
      if(e.key==='ArrowLeft') move('left');
      if(e.key==='ArrowRight') move('right');
      if(e.key==='ArrowUp') move('up');
      if(e.key==='ArrowDown') move('down');
    });

    // Touch support
    var touchX,touchY;
    document.addEventListener('touchstart',function(e){ touchX=e.touches[0].clientX; touchY=e.touches[0].clientY; });
    document.addEventListener('touchend',function(e){
      var dx=e.changedTouches[0].clientX-touchX;
      var dy=e.changedTouches[0].clientY-touchY;
      if(Math.abs(dx)>Math.abs(dy)){ move(dx>0?'right':'left'); }
      else { move(dy>0?'down':'up'); }
    });
  </script>
</body>
</html>
