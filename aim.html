<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aim Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Rajdhani',sans-serif;background:linear-gradient(135deg,#0d0d1a,#12122a,#1a1a3e);min-height:100vh;color:#fff;display:flex;flex-direction:column;align-items:center;}
    .navbar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:rgba(13,13,26,0.9);border-bottom:1px solid rgba(255,255,255,0.08);}
    .logo{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#00bcd4;}
    .back-btn{padding:7px 16px;background:transparent;border:1px solid #00bcd4;color:#00bcd4;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;transition:all 0.3s;}
    .back-btn:hover{background:#00bcd4;color:#000;}
    .game-wrap{width:100%;max-width:700px;padding:20px 16px;display:flex;flex-direction:column;align-items:center;}
    .score-bar{display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;}
    .score-item{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 20px;text-align:center;}
    .score-item .val{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#00bcd4;}
    .score-item .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px;}
    .arena{width:100%;max-width:600px;height:360px;background:rgba(0,0,0,0.4);border:2px solid rgba(0,188,212,0.3);border-radius:16px;position:relative;overflow:hidden;cursor:crosshair;margin-bottom:16px;}
    .target{position:absolute;border-radius:50%;cursor:pointer;transition:transform 0.1s;display:flex;align-items:center;justify-content:center;font-size:20px;}
    .target:hover{transform:scale(1.1);}
    .start-btn{padding:12px 32px;background:#00bcd4;color:#000;border:none;border-radius:10px;font-family:'Orbitron',monospace;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:1px;}
    .start-btn:hover{opacity:0.85;}
    .status{font-size:16px;color:#888;margin-bottom:12px;text-align:center;}
    .timer-bar{width:100%;max-width:600px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;margin-bottom:16px;overflow:hidden;}
    .timer-fill{height:100%;background:#00bcd4;border-radius:4px;transition:width 0.1s linear;}
    .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:999;}
    .overlay.show{display:flex;}
    .overlay-box{background:#12122a;border:2px solid #00bcd4;border-radius:20px;padding:40px;text-align:center;min-width:280px;}
    .overlay-box h2{font-family:'Orbitron',monospace;font-size:22px;margin-bottom:10px;color:#00bcd4;}
    .overlay-box .big{font-family:'Orbitron',monospace;font-size:48px;font-weight:900;color:#00bcd4;margin:12px 0;}
    .overlay-box p{color:#888;margin-bottom:20px;font-size:14px;}
    .btn-row{display:flex;gap:12px;justify-content:center;}
    .btn-o{padding:12px 28px;background:#00bcd4;color:#000;border:none;border-radius:8px;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;}
    .btn-s{padding:12px 20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:14px;cursor:pointer;}
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">🎯 AIM TRAINER</div>
    <button class="back-btn" onclick="window.location.href='dashboard.html'">⬅ Dashboard</button>
  </div>
  <div class="game-wrap">
    <div class="score-bar">
      <div class="score-item"><div class="val" id="scoreVal">0</div><div class="lbl">Score</div></div>
      <div class="score-item"><div class="val" id="hitsVal">0</div><div class="lbl">Hits</div></div>
      <div class="score-item"><div class="val" id="bestVal">0</div><div class="lbl">Best</div></div>
      <div class="score-item"><div class="val" id="timeVal">30s</div><div class="lbl">Time</div></div>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    <div class="status" id="statusMsg">🎯 Targets pe click karo — 30 seconds!</div>
    <div class="arena" id="arena"></div>
    <button class="start-btn" id="startBtn" onclick="startGame()">▶ START</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-box">
      <h2>⏱ TIME UP!</h2>
      <div class="big" id="finalScore">0</div>
      <p id="finalMsg">targets hit kiye!</p>
      <div class="btn-row">
        <button class="btn-o" onclick="restartGame()">🔄 Again</button>
        <button class="btn-s" onclick="window.location.href='dashboard.html'">🏠 Dashboard</button>
      </div>
    </div>
  </div>

  <script>
    if(localStorage.getItem('isLoggedIn')!=='true') window.location.href='index.html';
    var best=parseInt(localStorage.getItem('aimBest'))||0;
    document.getElementById('bestVal').innerText=best;
    var score=0,hits=0,timeLeft=30,gameTimer=null,targetTimer=null,running=false;
    var colors=['#e94560','#00e676','#ff9800','#00bcd4','#e91e63','#9c27b0'];

    function startGame(){
      document.getElementById('startBtn').style.display='none';
      score=0;hits=0;timeLeft=30;running=true;
      document.getElementById('scoreVal').innerText=0;
      document.getElementById('hitsVal').innerText=0;
      document.getElementById('timeVal').innerText='30s';
      document.getElementById('timerFill').style.width='100%';
      document.getElementById('statusMsg').innerText='🎯 Click the targets!';
      document.getElementById('arena').innerHTML='';
      spawnTarget();
      gameTimer=setInterval(function(){
        timeLeft--;
        document.getElementById('timeVal').innerText=timeLeft+'s';
        document.getElementById('timerFill').style.width=(timeLeft/30*100)+'%';
        if(timeLeft<=0){ endGame(); }
      },1000);
    }

    function spawnTarget(){
      if(!running) return;
      var arena=document.getElementById('arena');
      arena.innerHTML='';
      var size=Math.floor(Math.random()*40+30);
      var maxX=arena.offsetWidth-size-10;
      var maxY=arena.offsetHeight-size-10;
      var x=Math.floor(Math.random()*maxX+5);
      var y=Math.floor(Math.random()*maxY+5);
      var color=colors[Math.floor(Math.random()*colors.length)];
      var t=document.createElement('div');
      t.className='target';
      t.style.cssText='width:'+size+'px;height:'+size+'px;left:'+x+'px;top:'+y+'px;background:'+color+';box-shadow:0 0 20px '+color+'66;';
      t.innerHTML='🎯';
      t.addEventListener('click',function(){
        if(!running) return;
        score+=Math.floor(100/size*20);
        hits++;
        document.getElementById('scoreVal').innerText=score;
        document.getElementById('hitsVal').innerText=hits;
        spawnTarget();
      });
      arena.appendChild(t);
      targetTimer=setTimeout(spawnTarget,2000);
    }

    function endGame(){
      running=false;
      clearInterval(gameTimer);
      clearTimeout(targetTimer);
      document.getElementById('arena').innerHTML='';
      if(score>best){ best=score; localStorage.setItem('aimBest',best); document.getElementById('bestVal').innerText=best; }
      var played=parseInt(localStorage.getItem('gamesPlayed'))||0;
      localStorage.setItem('gamesPlayed',played+1);
      document.getElementById('finalScore').innerText=hits;
      document.getElementById('finalMsg').innerText=hits+' targets hit! Score: '+score;
      document.getElementById('overlay').classList.add('show');
    }

    function restartGame(){
      document.getElementById('overlay').classList.remove('show');
      document.getElementById('startBtn').style.display='block';
      document.getElementById('statusMsg').innerText='🎯 Targets pe click karo — 30 seconds!';
      document.getElementById('timerFill').style.width='100%';
    }
  </script>
</body>
</html>
