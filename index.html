<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN FORM -->
  <div class="card" id="loginCard">
    <h2>🔐 Login</h2>
cd android
.\gradlew assembleDebug
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" />
    </div>

    <button class="btn" onclick="handleLogin()">Login</button>
    <div class="msg" id="loginMsg"></div>

    <div class="switch-text">
      Don't have an account?
      <a onclick="showRegister()">Register Here</a>
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div class="card hidden" id="registerCard">
    <h2>📝 Register</h2>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Enter your full name" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="regEmail" placeholder="Enter your email" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="regPhone" placeholder="Enter your phone number" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Create a password" />
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="regConfirm" placeholder="Re-enter your password" />
    </div>

    <button class="btn" onclick="handleRegister()">Create Account</button>
    <div class="msg" id="registerMsg"></div>

    <div class="switch-text">
      Already have an account?
      <a onclick="showLogin()">Login Here</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
